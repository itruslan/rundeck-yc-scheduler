# Rundeck Job Definition: Start All Resources
#
# Starts all resource types at once.

- defaultTab: nodes
  executionEnabled: true
  loglevel: INFO
  name: Start All
  nodeFilterEditable: true
  nodefilters:
    dispatch:
      excludePrecedence: true
      keepgoing: true
      rankAttribute: stop_order
      rankOrder: ascending
      successOnEmptyNodeFilter: false
      threadcount: "10"
    filter: "resource_type: .*"
    # Exclude nodes by label (optional):
    # filterExclude: "labels:no_autoshutdown: true"
  nodesSelectedByDefault: true
  scheduleEnabled: false
  # Uncomment to enable scheduled execution:
  # scheduleEnabled: true
  # schedule:
  #   month: "*"
  #   time:
  #     hour: "07"
  #     minute: "00"
  #     seconds: "0"
  #   weekday:
  #     day: MON,TUE,WED,THU,FRI
  #   year: "*"
  # timeZone: Europe/Moscow
  sequence:
    commands:
      - nodeStep: true
        type: yc-start
        configuration:
          yc_sa_key: keys/project/${job.project}/yc-sa-key
    keepgoing: false
    strategy: node-first
