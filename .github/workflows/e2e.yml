name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to test'
        type: string
        default: 'staging'
      compute_instance:
        description: 'Test compute instances'
        type: boolean
        default: true
      managed_postgresql:
        description: 'Test managed PostgreSQL (~5 min)'
        type: boolean
        default: false
      managed_kubernetes:
        description: 'Test Managed Kubernetes (~15 min)'
        type: boolean
        default: false
      network_load_balancer:
        description: 'Test Network Load Balancers'
        type: boolean
        default: false
      managed_kafka:
        description: 'Test Managed Kafka (~10 min)'
        type: boolean
        default: false

# ---------------------------------------------------------------------------
# Shared steps (referenced inline — GHA does not support YAML anchors,
# so common logic is kept in scripts or repeated explicitly per job).
# ---------------------------------------------------------------------------

jobs:
  # -------------------------------------------------------------------------
  # compute-instance
  # -------------------------------------------------------------------------
  test-compute-instance:
    if: ${{ inputs.compute_instance }}
    name: compute-instance
    runs-on: ubuntu-latest
    env:
      RUNDECK_URL: http://localhost:4440
      FOLDER_ID: ${{ secrets.E2E_YC_FOLDER_ID }}
      ZONE: ru-central1-a
      INSTANCE_NAME: ${{ github.event.repository.name }}-compute-instance-${{ github.run_id }}

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Install yc CLI
        run: curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | sudo bash -s -- -i /usr/local -n

      - name: Configure yc CLI
        env:
          YC_SA_KEY: ${{ secrets.E2E_YC_SA_KEY }}
        run: |
          echo "$YC_SA_KEY" > /tmp/sa-key.json
          yc config set service-account-key /tmp/sa-key.json
          yc config set folder-id "$FOLDER_ID"

      - name: Start Rundeck
        run: |
          docker run -d --name rundeck \
            -p 4440:4440 \
            ghcr.io/${{ github.repository }}:${{ inputs.image_tag }}

      - name: Wait for Rundeck and create API token
        run: |
          for i in $(seq 1 60); do
            STATUS=$(curl -s -c /tmp/rundeck-cookie.txt -o /dev/null -w "%{http_code}" \
              --max-redirs 0 \
              -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "j_username=admin&j_password=admin" \
              "$RUNDECK_URL/j_security_check" 2>/dev/null || echo "000")
            echo "Attempt $i/60, login status: $STATUS"
            if [ "$STATUS" = "302" ]; then
              echo "Rundeck ready"
              break
            fi
            sleep 5
          done
          [ "$STATUS" = "302" ] || { docker logs rundeck; exit 1; }

          TOKEN=$(curl -sf -b /tmp/rundeck-cookie.txt \
            -X POST \
            "$RUNDECK_URL/api/57/tokens/admin" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{"roles":"admin"}' \
            | jq -r '.token')
          echo "RUNDECK_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v4

      - name: Terraform apply
        run: |
          cd examples/configuration/terraform-rundeck-yc-scheduler
          terraform init -input=false
          SA_KEY_B64=$(base64 -w 0 /tmp/sa-key.json)
          export TF_VAR_rundeck_url="$RUNDECK_URL"
          export TF_VAR_rundeck_auth_token="$RUNDECK_TOKEN"
          export TF_VAR_projects=$(jq -n \
            --arg folder_id "$FOLDER_ID" \
            --arg sa_key "$SA_KEY_B64" \
            '[{"name":"e2e","folder_id":$folder_id,"yc_sa_key":$sa_key,"resource_types":{"compute-instance":{"enabled":true},"managed-postgresql":{"enabled":true},"managed-kubernetes":{"enabled":true},"network-load-balancer":{"enabled":true}}}]')
          terraform apply -auto-approve -input=false

      - name: Create compute instance
        id: resource
        run: |
          SUBNET_ID=$(yc vpc subnet list --folder-id "$FOLDER_ID" --format json \
            | jq -r --arg zone "$ZONE" '[.[] | select(.zone_id==$zone)][0].id')
          echo "Using subnet: $SUBNET_ID"
          yc compute instance create \
            --name "$INSTANCE_NAME" \
            --folder-id "$FOLDER_ID" \
            --zone "$ZONE" \
            --platform-id standard-v3 \
            --cores 2 \
            --memory 1GB \
            --core-fraction 20 \
            --create-boot-disk "image-folder-id=standard-images,image-family=ubuntu-2204-lts,size=10,type=network-hdd" \
            --network-interface "subnet-id=$SUBNET_ID" \
            --labels "for-test=true" \
            --async
          INSTANCE_ID=$(yc compute instance get --name "$INSTANCE_NAME" --folder-id "$FOLDER_ID" --format json | jq -r '.id')
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "Instance ID: $INSTANCE_ID"

      - name: Wait for instance RUNNING
        run: |
          for i in $(seq 1 30); do
            STATUS=$(yc compute instance get --id "${{ steps.resource.outputs.instance_id }}" --format json | jq -r '.status')
            echo "[$i/30] status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then exit 0; fi
            sleep 10
          done
          echo "Timed out waiting for RUNNING"
          exit 1

      - name: Wait for node in Rundeck
        run: |
          uv run tests/e2e/rundeck.py wait-node \
            --project e2e \
            --resource-id "${{ steps.resource.outputs.instance_id }}"

      - name: Run stop job
        run: |
          uv run tests/e2e/rundeck.py run-job \
            --project e2e \
            --group e2e/compute-instance \
            --name Stop \
            --resource-id "${{ steps.resource.outputs.instance_id }}"

      - name: Verify STOPPED in YC
        run: |
          STATUS=$(yc compute instance get --id "${{ steps.resource.outputs.instance_id }}" --format json | jq -r '.status')
          echo "Status: $STATUS"
          [ "$STATUS" = "STOPPED" ] || { echo "Expected STOPPED, got $STATUS"; exit 1; }

      - name: Run start job
        run: |
          uv run tests/e2e/rundeck.py run-job \
            --project e2e \
            --group e2e/compute-instance \
            --name Start \
            --resource-id "${{ steps.resource.outputs.instance_id }}"

      - name: Verify RUNNING in YC
        run: |
          for i in $(seq 1 12); do
            STATUS=$(yc compute instance get --id "${{ steps.resource.outputs.instance_id }}" --format json | jq -r '.status')
            echo "[$i/12] status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then exit 0; fi
            sleep 10
          done
          echo "Timed out waiting for RUNNING"
          exit 1

      - name: Cleanup - delete instance
        if: always()
        run: yc compute instance delete --id "${{ steps.resource.outputs.instance_id }}" --async || true

      - name: Cleanup - verify instance deleted
        if: always()
        run: |
          for i in $(seq 1 18); do
            if ! yc compute instance get --id "${{ steps.resource.outputs.instance_id }}" --format json > /dev/null 2>&1; then
              echo "Instance deleted"
              exit 0
            fi
            echo "[$i/18] still exists..."
            sleep 10
          done
          echo "ERROR: Instance not deleted after 3 minutes"
          exit 1

      - name: Cleanup - stop Rundeck
        if: always()
        run: docker rm -f rundeck || true

      - name: Summary
        if: always()
        run: |
          echo "## E2E: compute-instance" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image tag | \`${{ inputs.image_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Instance  | \`$INSTANCE_NAME\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Instance ID | \`${{ steps.resource.outputs.instance_id }}\` |" >> "$GITHUB_STEP_SUMMARY"

  # -------------------------------------------------------------------------
  # managed-postgresql
  # -------------------------------------------------------------------------
  test-managed-postgresql:
    if: ${{ inputs.managed_postgresql }}
    name: managed-postgresql
    runs-on: ubuntu-latest
    env:
      RUNDECK_URL: http://localhost:4440
      FOLDER_ID: ${{ secrets.E2E_YC_FOLDER_ID }}
      ZONE: ru-central1-a
      CLUSTER_NAME: ${{ github.event.repository.name }}-managed-postgresql-${{ github.run_id }}

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Install yc CLI
        run: curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | sudo bash -s -- -i /usr/local -n

      - name: Configure yc CLI
        env:
          YC_SA_KEY: ${{ secrets.E2E_YC_SA_KEY }}
        run: |
          echo "$YC_SA_KEY" > /tmp/sa-key.json
          yc config set service-account-key /tmp/sa-key.json
          yc config set folder-id "$FOLDER_ID"

      - name: Start Rundeck
        run: |
          docker run -d --name rundeck \
            -p 4440:4440 \
            ghcr.io/${{ github.repository }}:${{ inputs.image_tag }}

      - name: Wait for Rundeck and create API token
        run: |
          for i in $(seq 1 60); do
            STATUS=$(curl -s -c /tmp/rundeck-cookie.txt -o /dev/null -w "%{http_code}" \
              --max-redirs 0 \
              -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "j_username=admin&j_password=admin" \
              "$RUNDECK_URL/j_security_check" 2>/dev/null || echo "000")
            echo "Attempt $i/60, login status: $STATUS"
            if [ "$STATUS" = "302" ]; then
              echo "Rundeck ready"
              break
            fi
            sleep 5
          done
          [ "$STATUS" = "302" ] || { docker logs rundeck; exit 1; }

          TOKEN=$(curl -sf -b /tmp/rundeck-cookie.txt \
            -X POST \
            "$RUNDECK_URL/api/57/tokens/admin" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{"roles":"admin"}' \
            | jq -r '.token')
          echo "RUNDECK_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v4

      - name: Terraform apply
        run: |
          cd examples/configuration/terraform-rundeck-yc-scheduler
          terraform init -input=false
          SA_KEY_B64=$(base64 -w 0 /tmp/sa-key.json)
          export TF_VAR_rundeck_url="$RUNDECK_URL"
          export TF_VAR_rundeck_auth_token="$RUNDECK_TOKEN"
          export TF_VAR_projects=$(jq -n \
            --arg folder_id "$FOLDER_ID" \
            --arg sa_key "$SA_KEY_B64" \
            '[{"name":"e2e","folder_id":$folder_id,"yc_sa_key":$sa_key,"resource_types":{"compute-instance":{"enabled":true},"managed-postgresql":{"enabled":true},"managed-kubernetes":{"enabled":true},"network-load-balancer":{"enabled":true}}}]')
          terraform apply -auto-approve -input=false

      - name: Create PostgreSQL cluster
        id: resource
        run: |
          SUBNET_ID=$(yc vpc subnet list --folder-id "$FOLDER_ID" --format json \
            | jq -r --arg zone "$ZONE" '[.[] | select(.zone_id==$zone)][0].id')
          NETWORK_ID=$(yc vpc subnet list --folder-id "$FOLDER_ID" --format json \
            | jq -r --arg zone "$ZONE" '[.[] | select(.zone_id==$zone)][0].network_id')
          echo "Using subnet: $SUBNET_ID, network: $NETWORK_ID"
          PG_PASSWORD=$(python3 -c "import secrets; print(secrets.token_urlsafe(12))")
          yc managed-postgresql cluster create \
            --name "$CLUSTER_NAME" \
            --folder-id "$FOLDER_ID" \
            --network-id "$NETWORK_ID" \
            --environment prestable \
            --postgresql-version 16 \
            --resource-preset c3-c2-m4 \
            --disk-type network-hdd \
            --disk-size 10 \
            --host "zone-id=$ZONE,subnet-id=$SUBNET_ID" \
            --user "name=appuser,password=$PG_PASSWORD" \
            --database "name=testdb,owner=appuser" \
            --labels "for-test=true" \
            --async
          CLUSTER_ID=$(yc managed-postgresql cluster get --name "$CLUSTER_NAME" --folder-id "$FOLDER_ID" --format json | jq -r '.id')
          echo "cluster_id=$CLUSTER_ID" >> "$GITHUB_OUTPUT"
          echo "Cluster ID: $CLUSTER_ID"

      - name: Wait for cluster RUNNING
        run: |
          for i in $(seq 1 60); do
            STATUS=$(yc managed-postgresql cluster get --id "${{ steps.resource.outputs.cluster_id }}" --format json | jq -r '.status')
            echo "[$i/60] status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then exit 0; fi
            sleep 15
          done
          echo "Timed out waiting for RUNNING"
          exit 1

      - name: Wait for node in Rundeck
        run: |
          uv run tests/e2e/rundeck.py wait-node \
            --project e2e \
            --resource-id "${{ steps.resource.outputs.cluster_id }}" \
            --timeout 180

      - name: Create manual backup and wait for completion
        run: |
          yc managed-postgresql cluster backup --id "${{ steps.resource.outputs.cluster_id }}"
          for i in $(seq 1 30); do
            STATUS=$(yc managed-postgresql backup list \
              --format json | jq -r --arg id "${{ steps.resource.outputs.cluster_id }}" \
              '[.[] | select(.source_cluster_id==$id and .status=="DONE")][0].status // "NONE"')
            echo "[$i/30] backup status: $STATUS"
            if [ "$STATUS" = "DONE" ]; then
              echo "Backup ready"
              exit 0
            fi
            sleep 20
          done
          echo "Timed out waiting for backup"
          exit 1

      - name: Run stop job
        run: |
          uv run tests/e2e/rundeck.py run-job \
            --project e2e \
            --group e2e/managed-postgresql \
            --name Stop \
            --resource-id "${{ steps.resource.outputs.cluster_id }}" \
            --timeout 600

      - name: Verify STOPPED in YC
        run: |
          STATUS=$(yc managed-postgresql cluster get --id "${{ steps.resource.outputs.cluster_id }}" --format json | jq -r '.status')
          echo "Status: $STATUS"
          [ "$STATUS" = "STOPPED" ] || { echo "Expected STOPPED, got $STATUS"; exit 1; }

      - name: Run start job
        run: |
          uv run tests/e2e/rundeck.py run-job \
            --project e2e \
            --group e2e/managed-postgresql \
            --name Start \
            --resource-id "${{ steps.resource.outputs.cluster_id }}" \
            --timeout 600

      - name: Verify RUNNING in YC
        run: |
          for i in $(seq 1 40); do
            STATUS=$(yc managed-postgresql cluster get --id "${{ steps.resource.outputs.cluster_id }}" --format json | jq -r '.status')
            echo "[$i/40] status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then exit 0; fi
            sleep 15
          done
          echo "Timed out waiting for RUNNING"
          exit 1

      - name: Cleanup - delete cluster
        if: always()
        run: yc managed-postgresql cluster delete --id "${{ steps.resource.outputs.cluster_id }}" --async || true

      - name: Cleanup - verify cluster deleted
        if: always()
        run: |
          for i in $(seq 1 30); do
            if ! yc managed-postgresql cluster get --id "${{ steps.resource.outputs.cluster_id }}" --format json > /dev/null 2>&1; then
              echo "Cluster deleted"
              exit 0
            fi
            echo "[$i/30] still exists..."
            sleep 10
          done
          echo "ERROR: Cluster not deleted after 5 minutes"
          exit 1

      - name: Cleanup - stop Rundeck
        if: always()
        run: docker rm -f rundeck || true

      - name: Summary
        if: always()
        run: |
          echo "## E2E: managed-postgresql" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image tag | \`${{ inputs.image_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster   | \`$CLUSTER_NAME\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster ID | \`${{ steps.resource.outputs.cluster_id }}\` |" >> "$GITHUB_STEP_SUMMARY"

  # -------------------------------------------------------------------------
  # k8s-cluster
  # -------------------------------------------------------------------------
  test-managed-kubernetes:
    if: ${{ inputs.managed_kubernetes }}
    name: managed-kubernetes
    runs-on: ubuntu-latest
    env:
      RUNDECK_URL: http://localhost:4440
      FOLDER_ID: ${{ secrets.E2E_YC_FOLDER_ID }}
      ZONE: ru-central1-a
      CLUSTER_NAME: ${{ github.event.repository.name }}-managed-kubernetes-${{ github.run_id }}

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Install yc CLI
        run: curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | sudo bash -s -- -i /usr/local -n

      - name: Configure yc CLI
        env:
          YC_SA_KEY: ${{ secrets.E2E_YC_SA_KEY }}
        run: |
          echo "$YC_SA_KEY" > /tmp/sa-key.json
          yc config set service-account-key /tmp/sa-key.json
          yc config set folder-id "$FOLDER_ID"

      - name: Start Rundeck
        run: |
          docker run -d --name rundeck \
            -p 4440:4440 \
            ghcr.io/${{ github.repository }}:${{ inputs.image_tag }}

      - name: Wait for Rundeck and create API token
        run: |
          for i in $(seq 1 60); do
            STATUS=$(curl -s -c /tmp/rundeck-cookie.txt -o /dev/null -w "%{http_code}" \
              --max-redirs 0 \
              -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "j_username=admin&j_password=admin" \
              "$RUNDECK_URL/j_security_check" 2>/dev/null || echo "000")
            echo "Attempt $i/60, login status: $STATUS"
            if [ "$STATUS" = "302" ]; then
              echo "Rundeck ready"
              break
            fi
            sleep 5
          done
          [ "$STATUS" = "302" ] || { docker logs rundeck; exit 1; }

          TOKEN=$(curl -sf -b /tmp/rundeck-cookie.txt \
            -X POST \
            "$RUNDECK_URL/api/57/tokens/admin" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{"roles":"admin"}' \
            | jq -r '.token')
          echo "RUNDECK_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v4

      - name: Terraform apply
        run: |
          cd examples/configuration/terraform-rundeck-yc-scheduler
          terraform init -input=false
          SA_KEY_B64=$(base64 -w 0 /tmp/sa-key.json)
          export TF_VAR_rundeck_url="$RUNDECK_URL"
          export TF_VAR_rundeck_auth_token="$RUNDECK_TOKEN"
          export TF_VAR_projects=$(jq -n \
            --arg folder_id "$FOLDER_ID" \
            --arg sa_key "$SA_KEY_B64" \
            '[{"name":"e2e","folder_id":$folder_id,"yc_sa_key":$sa_key,"resource_types":{"compute-instance":{"enabled":true},"managed-postgresql":{"enabled":true},"managed-kubernetes":{"enabled":true},"network-load-balancer":{"enabled":true}}}]')
          terraform apply -auto-approve -input=false

      - name: Create K8s cluster
        id: resource
        run: |
          SUBNET_ID=$(yc vpc subnet list --folder-id "$FOLDER_ID" --format json \
            | jq -r --arg zone "$ZONE" '[.[] | select(.zone_id==$zone)][0].id')
          NETWORK_ID=$(yc vpc subnet list --folder-id "$FOLDER_ID" --format json \
            | jq -r --arg zone "$ZONE" '[.[] | select(.zone_id==$zone)][0].network_id')
          echo "Using subnet: $SUBNET_ID, network: $NETWORK_ID"

          SA_ID=$(jq -r '.service_account_id' /tmp/sa-key.json)
          echo "Using CI SA: $SA_ID"

          yc managed-kubernetes cluster create \
            --name "$CLUSTER_NAME" \
            --folder-id "$FOLDER_ID" \
            --network-id "$NETWORK_ID" \
            --zone "$ZONE" \
            --subnet-id "$SUBNET_ID" \
            --service-account-id "$SA_ID" \
            --node-service-account-id "$SA_ID" \
            --service-ipv4-range 10.100.0.0/16 \
            --cluster-ipv4-range 10.200.0.0/16 \
            --cilium \
            --labels "for-test=true" \
            --async
          CLUSTER_ID=$(yc managed-kubernetes cluster get --name "$CLUSTER_NAME" --folder-id "$FOLDER_ID" --format json | jq -r '.id')
          echo "cluster_id=$CLUSTER_ID" >> "$GITHUB_OUTPUT"
          echo "Cluster ID: $CLUSTER_ID"

      - name: Wait for cluster RUNNING
        run: |
          for i in $(seq 1 90); do
            STATUS=$(yc managed-kubernetes cluster get --id "${{ steps.resource.outputs.cluster_id }}" --format json | jq -r '.status')
            echo "[$i/90] status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then exit 0; fi
            sleep 15
          done
          echo "Timed out waiting for RUNNING"
          exit 1

      - name: Wait for node in Rundeck
        run: |
          uv run tests/e2e/rundeck.py wait-node \
            --project e2e \
            --resource-id "${{ steps.resource.outputs.cluster_id }}" \
            --timeout 180

      - name: Run stop job
        run: |
          uv run tests/e2e/rundeck.py run-job \
            --project e2e \
            --group e2e/managed-kubernetes \
            --name Stop \
            --resource-id "${{ steps.resource.outputs.cluster_id }}" \
            --timeout 600

      - name: Verify STOPPED in YC
        run: |
          for i in $(seq 1 40); do
            STATUS=$(yc managed-kubernetes cluster get --id "${{ steps.resource.outputs.cluster_id }}" --format json | jq -r '.status')
            echo "[$i/40] status: $STATUS"
            if [ "$STATUS" = "STOPPED" ]; then exit 0; fi
            sleep 15
          done
          echo "Timed out waiting for STOPPED"
          exit 1

      - name: Run start job
        run: |
          uv run tests/e2e/rundeck.py run-job \
            --project e2e \
            --group e2e/managed-kubernetes \
            --name Start \
            --resource-id "${{ steps.resource.outputs.cluster_id }}" \
            --timeout 900

      - name: Verify RUNNING in YC
        run: |
          for i in $(seq 1 60); do
            STATUS=$(yc managed-kubernetes cluster get --id "${{ steps.resource.outputs.cluster_id }}" --format json | jq -r '.status')
            echo "[$i/60] status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then exit 0; fi
            sleep 15
          done
          echo "Timed out waiting for RUNNING"
          exit 1

      - name: Cleanup - delete cluster
        if: always()
        run: yc managed-kubernetes cluster delete --id "${{ steps.resource.outputs.cluster_id }}" --async || true

      - name: Cleanup - verify cluster deleted
        if: always()
        run: |
          for i in $(seq 1 90); do
            if ! yc managed-kubernetes cluster get --id "${{ steps.resource.outputs.cluster_id }}" --format json > /dev/null 2>&1; then
              echo "Cluster deleted"
              break
            fi
            echo "[$i/90] still exists..."
            sleep 10
          done
          yc managed-kubernetes cluster get --id "${{ steps.resource.outputs.cluster_id }}" --format json > /dev/null 2>&1 \
            && { echo "ERROR: Cluster not deleted after 15 minutes"; exit 1; } || true

      - name: Cleanup - stop Rundeck
        if: always()
        run: docker rm -f rundeck || true

      - name: Summary
        if: always()
        run: |
          echo "## E2E: managed-kubernetes" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image tag | \`${{ inputs.image_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster   | \`$CLUSTER_NAME\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster ID | \`${{ steps.resource.outputs.cluster_id }}\` |" >> "$GITHUB_STEP_SUMMARY"

  # -------------------------------------------------------------------------
  # network-load-balancer  (requires a VM as NLB target)
  # -------------------------------------------------------------------------
  test-network-load-balancer:
    if: ${{ inputs.network_load_balancer }}
    name: network-load-balancer
    runs-on: ubuntu-latest
    env:
      RUNDECK_URL: http://localhost:4440
      FOLDER_ID: ${{ secrets.E2E_YC_FOLDER_ID }}
      ZONE: ru-central1-a
      VM_NAME: ${{ github.event.repository.name }}-nlb-vm-${{ github.run_id }}
      TG_NAME: ${{ github.event.repository.name }}-nlb-tg-${{ github.run_id }}
      NLB_NAME: ${{ github.event.repository.name }}-nlb-${{ github.run_id }}

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Install yc CLI
        run: curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | sudo bash -s -- -i /usr/local -n

      - name: Configure yc CLI
        env:
          YC_SA_KEY: ${{ secrets.E2E_YC_SA_KEY }}
        run: |
          echo "$YC_SA_KEY" > /tmp/sa-key.json
          yc config set service-account-key /tmp/sa-key.json
          yc config set folder-id "$FOLDER_ID"

      - name: Start Rundeck
        run: |
          docker run -d --name rundeck \
            -p 4440:4440 \
            ghcr.io/${{ github.repository }}:${{ inputs.image_tag }}

      - name: Wait for Rundeck and create API token
        run: |
          for i in $(seq 1 60); do
            STATUS=$(curl -s -c /tmp/rundeck-cookie.txt -o /dev/null -w "%{http_code}" \
              --max-redirs 0 \
              -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "j_username=admin&j_password=admin" \
              "$RUNDECK_URL/j_security_check" 2>/dev/null || echo "000")
            echo "Attempt $i/60, login status: $STATUS"
            if [ "$STATUS" = "302" ]; then
              echo "Rundeck ready"
              break
            fi
            sleep 5
          done
          [ "$STATUS" = "302" ] || { docker logs rundeck; exit 1; }

          TOKEN=$(curl -sf -b /tmp/rundeck-cookie.txt \
            -X POST \
            "$RUNDECK_URL/api/57/tokens/admin" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{"roles":"admin"}' \
            | jq -r '.token')
          echo "RUNDECK_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v4

      - name: Terraform apply
        run: |
          cd examples/configuration/terraform-rundeck-yc-scheduler
          terraform init -input=false
          SA_KEY_B64=$(base64 -w 0 /tmp/sa-key.json)
          export TF_VAR_rundeck_url="$RUNDECK_URL"
          export TF_VAR_rundeck_auth_token="$RUNDECK_TOKEN"
          export TF_VAR_projects=$(jq -n \
            --arg folder_id "$FOLDER_ID" \
            --arg sa_key "$SA_KEY_B64" \
            '[{"name":"e2e","folder_id":$folder_id,"yc_sa_key":$sa_key,"resource_types":{"compute-instance":{"enabled":true},"managed-postgresql":{"enabled":true},"managed-kubernetes":{"enabled":true},"network-load-balancer":{"enabled":true}}}]')
          terraform apply -auto-approve -input=false

      - name: Create VM (NLB target)
        id: vm
        run: |
          SUBNET_ID=$(yc vpc subnet list --folder-id "$FOLDER_ID" --format json \
            | jq -r --arg zone "$ZONE" '[.[] | select(.zone_id==$zone)][0].id')
          echo "subnet_id=$SUBNET_ID" >> "$GITHUB_OUTPUT"
          echo "Using subnet: $SUBNET_ID"
          yc compute instance create \
            --name "$VM_NAME" \
            --folder-id "$FOLDER_ID" \
            --zone "$ZONE" \
            --platform-id standard-v3 \
            --cores 2 \
            --memory 1GB \
            --core-fraction 20 \
            --create-boot-disk "image-folder-id=standard-images,image-family=ubuntu-2204-lts,size=10,type=network-hdd" \
            --network-interface "subnet-id=$SUBNET_ID" \
            --labels "for-test=true" \
            --async
          VM_ID=$(yc compute instance get --name "$VM_NAME" --folder-id "$FOLDER_ID" --format json | jq -r '.id')
          echo "vm_id=$VM_ID" >> "$GITHUB_OUTPUT"
          echo "VM ID: $VM_ID"

      - name: Wait for VM RUNNING and get internal IP
        id: vm_ip
        run: |
          for i in $(seq 1 30); do
            INFO=$(yc compute instance get --id "${{ steps.vm.outputs.vm_id }}" --format json)
            STATUS=$(echo "$INFO" | jq -r '.status')
            IP=$(echo "$INFO" | jq -r '.network_interfaces[0].primary_v4_address.address // empty')
            echo "[$i/30] status: $STATUS, ip: $IP"
            if [ "$STATUS" = "RUNNING" ] && [ -n "$IP" ]; then
              echo "internal_ip=$IP" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for VM RUNNING"
          exit 1

      - name: Create target group and NLB
        id: nlb
        run: |
          yc load-balancer target-group create \
            --name "$TG_NAME" \
            --folder-id "$FOLDER_ID" \
            --labels "for-test=true"
          TG_ID=$(yc load-balancer target-group get --name "$TG_NAME" --folder-id "$FOLDER_ID" --format json | jq -r '.id')
          echo "tg_id=$TG_ID" >> "$GITHUB_OUTPUT"

          yc load-balancer target-group add-targets \
            --name "$TG_NAME" \
            --folder-id "$FOLDER_ID" \
            --target "subnet-id=${{ steps.vm.outputs.subnet_id }},address=${{ steps.vm_ip.outputs.internal_ip }}"

          yc load-balancer network-load-balancer create \
            --name "$NLB_NAME" \
            --folder-id "$FOLDER_ID" \
            --type internal \
            --labels "for-test=true"
          NLB_ID=$(yc load-balancer network-load-balancer get --name "$NLB_NAME" --folder-id "$FOLDER_ID" --format json | jq -r '.id')
          echo "nlb_id=$NLB_ID" >> "$GITHUB_OUTPUT"
          echo "NLB ID: $NLB_ID"

          yc load-balancer network-load-balancer attach-target-group \
            --name "$NLB_NAME" \
            --folder-id "$FOLDER_ID" \
            --target-group "target-group-id=$TG_ID,healthcheck-name=tcp-22,healthcheck-tcp-port=22"

          yc load-balancer network-load-balancer add-listener \
            --name "$NLB_NAME" \
            --folder-id "$FOLDER_ID" \
            --listener "name=listener-1,port=22,target-port=22,protocol=tcp,internal-subnet-id=${{ steps.vm.outputs.subnet_id }}"

      - name: Wait for NLB ACTIVE
        run: |
          for i in $(seq 1 30); do
            STATUS=$(yc load-balancer network-load-balancer get --id "${{ steps.nlb.outputs.nlb_id }}" --format json | jq -r '.status')
            echo "[$i/30] status: $STATUS"
            if [ "$STATUS" = "ACTIVE" ]; then exit 0; fi
            sleep 10
          done
          echo "Timed out waiting for ACTIVE"
          exit 1

      - name: Wait for NLB node in Rundeck
        run: |
          uv run tests/e2e/rundeck.py wait-node \
            --project e2e \
            --resource-id "${{ steps.nlb.outputs.nlb_id }}" \
            --timeout 180

      - name: Run stop job
        run: |
          uv run tests/e2e/rundeck.py run-job \
            --project e2e \
            --group e2e/network-load-balancer \
            --name Stop \
            --resource-id "${{ steps.nlb.outputs.nlb_id }}"

      - name: Verify STOPPED in YC
        run: |
          STATUS=$(yc load-balancer network-load-balancer get --id "${{ steps.nlb.outputs.nlb_id }}" --format json | jq -r '.status')
          echo "Status: $STATUS"
          [ "$STATUS" = "STOPPED" ] || { echo "Expected STOPPED, got $STATUS"; exit 1; }

      - name: Run start job
        run: |
          uv run tests/e2e/rundeck.py run-job \
            --project e2e \
            --group e2e/network-load-balancer \
            --name Start \
            --resource-id "${{ steps.nlb.outputs.nlb_id }}"

      - name: Verify ACTIVE in YC
        run: |
          for i in $(seq 1 12); do
            STATUS=$(yc load-balancer network-load-balancer get --id "${{ steps.nlb.outputs.nlb_id }}" --format json | jq -r '.status')
            echo "[$i/12] status: $STATUS"
            if [ "$STATUS" = "ACTIVE" ]; then exit 0; fi
            sleep 10
          done
          echo "Timed out waiting for ACTIVE"
          exit 1

      - name: Cleanup - delete NLB and target group
        if: always()
        run: |
          yc load-balancer network-load-balancer delete --id "${{ steps.nlb.outputs.nlb_id }}" || true
          yc load-balancer target-group delete --id "${{ steps.nlb.outputs.tg_id }}" || true

      - name: Cleanup - verify NLB deleted
        if: always()
        run: |
          if yc load-balancer network-load-balancer get --id "${{ steps.nlb.outputs.nlb_id }}" --format json > /dev/null 2>&1; then
            echo "ERROR: NLB still exists"
            exit 1
          fi
          echo "NLB deleted"

      - name: Cleanup - delete VM
        if: always()
        run: yc compute instance delete --id "${{ steps.vm.outputs.vm_id }}" --async || true

      - name: Cleanup - verify VM deleted
        if: always()
        run: |
          for i in $(seq 1 18); do
            if ! yc compute instance get --id "${{ steps.vm.outputs.vm_id }}" --format json > /dev/null 2>&1; then
              echo "VM deleted"
              exit 0
            fi
            echo "[$i/18] still exists..."
            sleep 10
          done
          echo "ERROR: VM not deleted after 3 minutes"
          exit 1

      - name: Cleanup - stop Rundeck
        if: always()
        run: docker rm -f rundeck || true

      - name: Summary
        if: always()
        run: |
          echo "## E2E: network-load-balancer" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image tag | \`${{ inputs.image_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| NLB       | \`$NLB_NAME\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| NLB ID    | \`${{ steps.nlb.outputs.nlb_id }}\` |" >> "$GITHUB_STEP_SUMMARY"

  # -------------------------------------------------------------------------
  # managed-kafka
  # -------------------------------------------------------------------------
  test-managed-kafka:
    if: ${{ inputs.managed_kafka }}
    name: managed-kafka
    runs-on: ubuntu-latest
    env:
      RUNDECK_URL: http://localhost:4440
      FOLDER_ID: ${{ secrets.E2E_YC_FOLDER_ID }}
      ZONE: ru-central1-a
      CLUSTER_NAME: ${{ github.event.repository.name }}-managed-kafka-${{ github.run_id }}

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Install yc CLI
        run: curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | sudo bash -s -- -i /usr/local -n

      - name: Configure yc CLI
        env:
          YC_SA_KEY: ${{ secrets.E2E_YC_SA_KEY }}
        run: |
          echo "$YC_SA_KEY" > /tmp/sa-key.json
          yc config set service-account-key /tmp/sa-key.json
          yc config set folder-id "$FOLDER_ID"

      - name: Start Rundeck
        run: |
          docker run -d --name rundeck \
            -p 4440:4440 \
            ghcr.io/${{ github.repository }}:${{ inputs.image_tag }}

      - name: Wait for Rundeck and create API token
        run: |
          for i in $(seq 1 60); do
            STATUS=$(curl -s -c /tmp/rundeck-cookie.txt -o /dev/null -w "%{http_code}" \
              --max-redirs 0 \
              -X POST \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "j_username=admin&j_password=admin" \
              "$RUNDECK_URL/j_security_check" 2>/dev/null || echo "000")
            echo "Attempt $i/60, login status: $STATUS"
            if [ "$STATUS" = "302" ]; then
              echo "Rundeck ready"
              break
            fi
            sleep 5
          done
          [ "$STATUS" = "302" ] || { docker logs rundeck; exit 1; }

          TOKEN=$(curl -sf -b /tmp/rundeck-cookie.txt \
            -X POST \
            "$RUNDECK_URL/api/57/tokens/admin" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{"roles":"admin"}' \
            | jq -r '.token')
          echo "RUNDECK_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v4

      - name: Terraform apply
        run: |
          cd examples/configuration/terraform-rundeck-yc-scheduler
          terraform init -input=false
          SA_KEY_B64=$(base64 -w 0 /tmp/sa-key.json)
          export TF_VAR_rundeck_url="$RUNDECK_URL"
          export TF_VAR_rundeck_auth_token="$RUNDECK_TOKEN"
          export TF_VAR_projects=$(jq -n \
            --arg folder_id "$FOLDER_ID" \
            --arg sa_key "$SA_KEY_B64" \
            '[{"name":"e2e","folder_id":$folder_id,"yc_sa_key":$sa_key,"resource_types":{"managed-kafka":{"enabled":true}}}]')
          terraform apply -auto-approve -input=false

      - name: Create Kafka cluster
        id: resource
        run: |
          SUBNET_ID=$(yc vpc subnet list --folder-id "$FOLDER_ID" --format json \
            | jq -r --arg zone "$ZONE" '[.[] | select(.zone_id==$zone)][0].id')
          NETWORK_ID=$(yc vpc subnet list --folder-id "$FOLDER_ID" --format json \
            | jq -r --arg zone "$ZONE" '[.[] | select(.zone_id==$zone)][0].network_id')
          echo "Using subnet: $SUBNET_ID, network: $NETWORK_ID"
          yc managed-kafka cluster create \
            --name "$CLUSTER_NAME" \
            --folder-id "$FOLDER_ID" \
            --network-id "$NETWORK_ID" \
            --environment prestable \
            --version 4.0 \
            --zone-ids "$ZONE" \
            --subnet-ids "$SUBNET_ID" \
            --resource-preset b3-c1-m4 \
            --disk-type network-hdd \
            --disk-size 10 \
            --brokers-count 1 \
            --labels "for-test=true" \
            --async
          CLUSTER_ID=$(yc managed-kafka cluster get --name "$CLUSTER_NAME" --folder-id "$FOLDER_ID" --format json | jq -r '.id')
          echo "cluster_id=$CLUSTER_ID" >> "$GITHUB_OUTPUT"
          echo "Cluster ID: $CLUSTER_ID"

      - name: Wait for cluster RUNNING
        run: |
          for i in $(seq 1 60); do
            STATUS=$(yc managed-kafka cluster get --id "${{ steps.resource.outputs.cluster_id }}" --format json | jq -r '.status')
            echo "[$i/60] status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then exit 0; fi
            sleep 15
          done
          echo "Timed out waiting for RUNNING"
          exit 1

      - name: Wait for node in Rundeck
        run: |
          uv run tests/e2e/rundeck.py wait-node \
            --project e2e \
            --resource-id "${{ steps.resource.outputs.cluster_id }}" \
            --timeout 180

      - name: Run stop job
        run: |
          uv run tests/e2e/rundeck.py run-job \
            --project e2e \
            --group e2e/managed-kafka \
            --name Stop \
            --resource-id "${{ steps.resource.outputs.cluster_id }}" \
            --timeout 600

      - name: Verify STOPPED in YC
        run: |
          STATUS=$(yc managed-kafka cluster get --id "${{ steps.resource.outputs.cluster_id }}" --format json | jq -r '.status')
          echo "Status: $STATUS"
          [ "$STATUS" = "STOPPED" ] || { echo "Expected STOPPED, got $STATUS"; exit 1; }

      - name: Run start job
        run: |
          uv run tests/e2e/rundeck.py run-job \
            --project e2e \
            --group e2e/managed-kafka \
            --name Start \
            --resource-id "${{ steps.resource.outputs.cluster_id }}" \
            --timeout 600

      - name: Verify RUNNING in YC
        run: |
          for i in $(seq 1 40); do
            STATUS=$(yc managed-kafka cluster get --id "${{ steps.resource.outputs.cluster_id }}" --format json | jq -r '.status')
            echo "[$i/40] status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then exit 0; fi
            sleep 15
          done
          echo "Timed out waiting for RUNNING"
          exit 1

      - name: Cleanup - delete cluster
        if: always()
        run: yc managed-kafka cluster delete --id "${{ steps.resource.outputs.cluster_id }}" --async || true

      - name: Cleanup - verify cluster deleted
        if: always()
        run: |
          for i in $(seq 1 30); do
            if ! yc managed-kafka cluster get --id "${{ steps.resource.outputs.cluster_id }}" --format json > /dev/null 2>&1; then
              echo "Cluster deleted"
              exit 0
            fi
            echo "[$i/30] still exists..."
            sleep 10
          done
          echo "ERROR: Cluster not deleted after 5 minutes"
          exit 1

      - name: Cleanup - stop Rundeck
        if: always()
        run: docker rm -f rundeck || true

      - name: Summary
        if: always()
        run: |
          echo "## E2E: managed-kafka" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image tag | \`${{ inputs.image_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster   | \`$CLUSTER_NAME\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster ID | \`${{ steps.resource.outputs.cluster_id }}\` |" >> "$GITHUB_STEP_SUMMARY"
