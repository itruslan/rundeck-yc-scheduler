name: Build

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'plugin/**'
      - 'requirements.txt'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'plugin/**'
      - 'requirements.txt'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: rundeck-yc-scheduler:build-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
